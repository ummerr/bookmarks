<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bookmarks Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 240px;
      background: #111;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      padding: 16px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 14px;
    }
    .header .dot { color: #1DA1F2; font-size: 16px; }
    .header span { font-weight: 600; font-size: 14px; }

    label {
      display: block;
      font-size: 11px;
      color: #71717a;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    input {
      width: 100%;
      padding: 8px 10px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: #fff;
      font-size: 12px;
      outline: none;
    }
    input:focus { border-color: rgba(29,161,242,0.5); }

    .save-btn {
      width: 100%;
      margin-top: 10px;
      padding: 8px 0;
      background: #1DA1F2;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    .save-btn:hover { background: #1a94da; }

    .saved { color: #4ade80; font-size: 11px; margin-top: 6px; text-align: center; }

    .divider {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.08);
      margin: 14px 0;
    }

    .hint {
      font-size: 11px;
      color: #52525b;
      line-height: 1.5;
    }
    .hint a { color: #1DA1F2; text-decoration: none; }
    .hint a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="header">
    <span class="dot">✦</span>
    <span>Bookmarks</span>
  </div>

  <label>Dashboard URL</label>
  <input type="text" id="url-input" placeholder="http://localhost:3000" />
  <button class="save-btn" id="save-btn">Save</button>
  <div class="saved" id="saved-msg"></div>

  <hr class="divider" />

  <p class="hint">
    Go to <a href="https://x.com/i/bookmarks" target="_blank">x.com/i/bookmarks</a>,
    scroll through all your bookmarks, then click <strong>Send to Dashboard</strong>
    in the floating panel.
  </p>

  <script src="popup.js"></script>
</body>
</html>
